    <!-- Background Wave Pattern -->
    <script>
        const canvas = document.getElementById('background');
        const CanvasDraw = canvas.getContext('2d');

        const LineSpacing = 18;     
        const StepSize = 8;
        const NoExtraLines = Math.ceil(100 / LineSpacing);

        let Width, Height, NoLines;
        let CurrentTime = 0;
        let PreviousTime = performance.now();
        let PRM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function GetCanvasData() {
            // Gets canvas info upon rescaling of window.
            Width = window.innerWidth;
            Height = window.innerHeight;
            canvas.width = Width;
            canvas.height = Height;
            CanvasDraw.setTransform(1, 0, 0, 1, 0, 0); // Identity: represents Device Pixel Ratio of 1 (speedy).
            NoLines = Math.ceil(Height / LineSpacing) + (NoExtraLines * 2);
        }
        window.addEventListener('resize', GetCanvasData);
        GetCanvasData();

        function DrawFrame() {
            // Resets Canvas.
            CanvasDraw.clearRect(0, 0, Width, Height);
            CanvasDraw.save();
            CanvasDraw.globalAlpha = 0.85;
            CanvasDraw.lineWidth   = 1.1;

            for (let yUnperturbed = -NoExtraLines * LineSpacing; yUnperturbed < (NoLines - NoExtraLines) * LineSpacing; yUnperturbed += LineSpacing) {
                CanvasDraw.beginPath();
                let MaxBrightness = 100; 
                let IterationCount = 0;

                for (let x = -StepSize; x <= Width + StepSize; x += StepSize) {
                    // Creates three waves, a large-amplitude wave, and then two out-of-phase jagged waves.
                    const GlobalWave = Math.sin(x * 0.005 + (yUnperturbed * 0.003) + (CurrentTime * 0.3));
                    const JaggedWave = Math.sin(x * 0.025 - (CurrentTime * 1.8) + GlobalWave * 6.5);
                    const JaggedJaggedWave = Math.cos(x * 0.075 + (CurrentTime * 3.2) + JaggedWave * 3.0);
                    
                    IterationCount++;
                    if (IterationCount % 4 === 0) {
                        // Gets the scaled local disturbance to calculate a value of Brightness ~ A^2
                        const Brightness = 130 + Math.abs(JaggedWave * JaggedJaggedWave) * 125;
                        if (Brightness > MaxBrightness) {
                            MaxBrightness = Brightness;
                        }
                    }

                    // Paints the wave.
                    let y = yUnperturbed + 100 * (GlobalWave * 0.75 + JaggedWave * 0.15 + JaggedJaggedWave * 0.08);
                    if (x <= -StepSize) {
                        CanvasDraw.moveTo(x, y);
                    } else {
                        CanvasDraw.lineTo(x, y);
                    }
                }

                const RoundedBrightness = Math.round(MaxBrightness);
                CanvasDraw.strokeStyle = `rgb(${RoundedBrightness},${RoundedBrightness},${RoundedBrightness})`;
                CanvasDraw.stroke();
            }
            CanvasDraw.restore();
        }

        function PlayAnimation(currentTime) {
            const dt = (currentTime - PreviousTime) / 1000;
            PreviousTime = currentTime;
            // Ensures that the animation plays the same irrespective of frame rate.
            if (!PRM) {CurrentTime += dt * 0.5; }
            DrawFrame();
            requestAnimationFrame(PlayAnimation);
        }
        window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change', e => {
            PRM = e.matches;
        });
        requestAnimationFrame((time) => {
            PreviousTime = time;
            PlayAnimation(time);
        });
    </script>

    <!-- Enables Panel Activation for touch screens upon click (instead of hover for desktop). -->
    <script>
        const panels = document.querySelectorAll('.panel');
        panels.forEach(panel => {
            panel.addEventListener('click', function(e) {
                if (this.classList.contains('active-redirect')) return;
                e.preventDefault();
                panels.forEach(p => p.classList.remove('active-redirect'));
                this.classList.add('active-redirect');
                setTimeout(() => {
                    window.location.href = this.getAttribute('href');
                }, 400);
            });
        });
    </script>
