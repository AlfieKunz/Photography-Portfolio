    <!-- Background Wave Pattern -->
    <script>
        const canvas = document.getElementById('background');
        const ctx    = canvas.getContext('2d');

        const LINE_SPACING   = 18;     
        const MAX_AMPLITUDE  = 100;     
        const BUFFER_LINES   = Math.ceil(MAX_AMPLITUDE / LINE_SPACING);

        let W, H, lineCount;
        let t = 0;
        let lastTime = performance.now();
        let prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width  = W;
            canvas.height = H;
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            lineCount = Math.ceil(H / LINE_SPACING) + (BUFFER_LINES * 2);
        }
        window.addEventListener('resize', resize);
        resize();

        function drawFrame() {
            ctx.clearRect(0, 0, W, H);

            ctx.save();
            ctx.globalAlpha = 0.85;
            ctx.lineWidth   = 1.1;

            const tMacro = t * 0.3;
            const tOct1  = t * 1.8;
            const tOct2  = t * 3.2;
            const batches = new Map();

            for (let i = 0; i < lineCount; i++) {
                const baseY = (i - BUFFER_LINES) * LINE_SPACING;

                const baseYMacro = baseY * 0.003; 

                ctx.beginPath();

                const STEP = 8;
                let maxBrightness = 100; 
                let stepCounter = 0;

                for (let x = -STEP; x <= W + STEP; x += STEP) {
                    
                    const macroWave = Math.sin(x * 0.005 + baseYMacro + tMacro);
                    const jaggedOctave1 = Math.sin(x * 0.025 - tOct1 + macroWave * 6.5);
                    const jaggedOctave2 = Math.cos(x * 0.075 + tOct2 + jaggedOctave1 * 3.0);
                    
                    const combinedField = (macroWave * 0.75) + (jaggedOctave1 * 0.15 + jaggedOctave2 * 0.08);
                    const y = baseY + (combinedField * MAX_AMPLITUDE);

                    if (stepCounter++ % 4 === 0) {
                        const localTurbulence = Math.abs(jaggedOctave1 * jaggedOctave2);
                        const currentBrightness = 130 + localTurbulence * 125;
                        if (currentBrightness > maxBrightness) {
                            maxBrightness = currentBrightness;
                        }
                    }

                    if (x <= -STEP) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                const finalBrightness = Math.round(maxBrightness);
                ctx.strokeStyle = `rgb(${finalBrightness},${finalBrightness},${finalBrightness})`;
                ctx.stroke();
            }

            ctx.restore();
        }

        function loop(currentTime) {
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            if (!prefersReduced) {
                t += dt * 0.5; 
            }
            
            drawFrame();
            requestAnimationFrame(loop);
        }

        window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change', e => {
            prefersReduced = e.matches;
        });

        requestAnimationFrame((time) => {
            lastTime = time;
            loop(time);
        });
    </script>
